
[Scope]
	#Reactive Focus(es) inside player's inventory (including main/off hand) take effect
	EnablesFocusInsideInventory = true
	#Reactive Focus(es) inside player's curios/trinkets slots take effect
	EnablesFocusInsideAccessories = true
	#Only the first Reactive Focus of a type met take effect; if set to false, all Focuses of certain type are triggered for each event (may cause performance impact)
	FirstFocusOnly = true
	#Reactive Focus(es) inside player's hands take effect; ignored if `Inventory` set to true
	EnablesFocusInHands = true
	#Reactive Focus(es) inside player's ender chest take effect
	EnablesFocusInsideEnderChest = false

[Execute]
	#Recursive triggered events in a tick deeper than this value will be rejected (e.g. teleport self inside `Teleported` focus)
	#Range: 0 ~ 114514
	MaxRecursiveEventsPerTick = 10
	#per time right before the hex get executed, in 1e-4 dust
	#Range: > 0
	EventTriggerTax = 0

